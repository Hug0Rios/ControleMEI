services:
  postgres:
    image: postgres:16-alpine
    container_name: controlemei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: controlemei
      POSTGRES_USER: controlemei
      POSTGRES_PASSWORD: controlemei
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlemei -d controlemei"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: controlemei-backend
    restart: unless-stopped
    environment:
      APP_NAME: ControleMEI API
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://controlemei:controlemei@postgres:5432/controlemei
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://127.0.0.1:8000/api/v1
    container_name: controlemei-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
